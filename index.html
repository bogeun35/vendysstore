<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store Vendys</title>
    <style>
        @font-face{font-family:'Pretendard';src:url('https://cdn.jsdelivr.net/gh/Project-Noonnu/noonfonts_2107@1.1/Pretendard-Regular.woff') format('woff');font-weight:400;}
        @font-face{font-family:'Pretendard';src:url('https://cdn.jsdelivr.net/gh/Project-Noonnu/noonfonts_2107@1.1/Pretendard-Medium.woff') format('woff');font-weight:500;}
        @font-face{font-family:'Pretendard';src:url('https://cdn.jsdelivr.net/gh/Project-Noonnu/noonfonts_2107@1.1/Pretendard-SemiBold.woff') format('woff');font-weight:600;}
        @font-face{font-family:'Pretendard';src:url('https://cdn.jsdelivr.net/gh/Project-Noonnu/noonfonts_2107@1.1/Pretendard-Bold.woff') format('woff');font-weight:700;}

        *{margin:0;padding:0;box-sizing:border-box;}
        html,body{height:100%;overflow:hidden;}
        body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Malgun Gothic',sans-serif;background:#1d1d1f;color:#1d1d1f;}

        /* ── GNB ── */
        .gnb{
            height:36px;background:#2d2d2f;
            display:flex;align-items:center;
            padding:0 16px;gap:0;
            border-bottom:1px solid #3a3a3c;
            position:relative;z-index:50;
        }
        .gnb-logo{
            font-size:.78rem;font-weight:700;color:#fff;
            display:flex;align-items:center;gap:5px;
            margin-right:12px;white-space:nowrap;
        }
        .gnb-logo .dot{width:6px;height:6px;border-radius:50%;background:#0071e3;}
        .gnb-divider{width:1px;height:16px;background:#48484a;margin:0 6px;}

        /* ── Category Menu ── */
        .gnb-menus{display:flex;gap:1px;flex:1;min-width:0;}
        .menu-group{position:relative;}
        .menu-trigger{
            padding:4px 10px;border-radius:4px;font-size:.72rem;font-weight:500;
            color:#8e8e93;cursor:pointer;border:none;background:none;
            font-family:inherit;white-space:nowrap;transition:all .12s;
            display:flex;align-items:center;gap:3px;
        }
        .menu-trigger:hover,.menu-trigger.open{color:#fff;background:rgba(255,255,255,.08);}
        .menu-trigger.has-active{color:#0071e3;}
        .menu-trigger .arrow{font-size:.55rem;opacity:.5;}
        .menu-dropdown{
            display:none;position:absolute;top:100%;left:0;
            background:#2d2d2f;border:1px solid #48484a;border-radius:6px;
            padding:4px 0;min-width:130px;margin-top:4px;
            box-shadow:0 8px 24px rgba(0,0,0,.4);
        }
        .menu-dropdown.show{display:block;}
        .menu-item{
            display:block;width:100%;padding:6px 14px;border:none;background:none;
            font-size:.72rem;font-weight:500;color:#ccc;font-family:inherit;
            text-align:left;cursor:pointer;transition:all .1s;white-space:nowrap;
        }
        .menu-item:hover{background:rgba(255,255,255,.08);color:#fff;}
        .menu-item.active{color:#0071e3;font-weight:600;}

        /* ── Config ── */
        .gnb-config{
            display:flex;align-items:center;gap:6px;margin-left:auto;flex-shrink:0;
        }
        .gnb-config label{font-size:.65rem;color:#6e6e73;font-weight:500;}
        .gnb-input{
            padding:3px 8px;border:1px solid #48484a;border-radius:4px;
            font-size:.7rem;font-family:inherit;background:#3a3a3c;color:#fff;
            outline:none;transition:border-color .15s;
        }
        .gnb-input:focus{border-color:#0071e3;}
        .gnb-input::placeholder{color:#636366;}
        .gnb-input.token{width:180px;}
        .gnb-input.storeid{width:140px;}
        .gnb-save{
            padding:3px 10px;border:none;border-radius:4px;
            background:#0071e3;color:#fff;font-size:.65rem;font-weight:600;
            font-family:inherit;cursor:pointer;transition:background .12s;
        }
        .gnb-save:hover{background:#0077ed;}
        .gnb-status{font-size:.6rem;font-weight:600;padding:2px 6px;border-radius:10px;}
        .gnb-status.on{background:#2e7d32;color:#fff;}
        .gnb-status.off{background:#c62828;color:#fff;}

        /* ── Content ── */
        .content{height:calc(100vh - 36px);display:flex;}

        /* ── Panels ── */
        .panel{display:flex;flex-direction:column;overflow:hidden;border-right:1px solid #3a3a3c;}
        .panel:last-child{border-right:none;}
        .panel-mobile{width:375px;flex-shrink:0;}
        .panel-desktop{flex:1;min-width:0;}
        .panel-label{
            height:22px;background:#2d2d2f;
            display:flex;align-items:center;padding:0 12px;
            font-size:.65rem;font-weight:600;color:#8e8e93;gap:6px;
            border-bottom:1px solid #3a3a3c;
        }
        .panel-label .size{color:#48484a;font-weight:400;}
        .panel-frame{flex:1;background:#fff;overflow:hidden;position:relative;}
        .panel-frame iframe{border:none;display:block;height:100%;}
        .panel-mobile .panel-frame iframe{width:375px;}
        .panel-desktop .panel-frame iframe{width:1920px;height:100%;transform-origin:top left;}

        .empty-state{flex:1;display:flex;align-items:center;justify-content:center;color:#48484a;font-size:.82rem;}
    </style>
</head>
<body>

<nav class="gnb">
    <div class="gnb-logo"><span class="dot"></span>Store Vendys</div>
    <div class="gnb-divider"></div>
    <div class="gnb-menus" id="gnbMenus"></div>
    <div class="gnb-divider"></div>
    <div class="gnb-config">
        <label>Token</label>
        <input type="text" class="gnb-input token" id="tokenInput" placeholder="Bearer token...">
        <label>SID</label>
        <input type="text" class="gnb-input storeid" id="storeIdInput" placeholder="Store UUID...">
        <button class="gnb-save" onclick="saveConfig()">Save</button>
        <span class="gnb-status off" id="tokenStatus">OFF</span>
    </div>
</nav>

<div class="content" id="content">
    <div class="empty-state">메뉴에서 페이지를 선택하세요</div>
</div>

<script>
    const menu = [
        { category: '매출통계', items: [
            { title: '매출현황', mobile: 'pages/sales.html', desktop: 'pages/sales-web.html' },
        ]},
        { category: '매장관리', items: [
            { title: '메뉴관리', mobile: 'pages/menu.html', desktop: 'pages/menu.html' },
            { title: '메뉴재고관리', mobile: 'pages/menu-stock.html', desktop: 'pages/menu-stock.html' },
            { title: '이미지설정', mobile: 'pages/image-setting.html', desktop: 'pages/image-setting.html' },
            { title: '리뷰관리', mobile: 'pages/review.html', desktop: 'pages/review.html' },
            { title: '예약관리', mobile: 'pages/reservation.html', desktop: 'pages/reservation.html' },
            { title: '예약현황', mobile: 'pages/reservation-status.html', desktop: 'pages/reservation-status.html' },
        ]},
        { category: '정산', items: [
            { title: '매출정산', mobile: 'pages/settlement.html', desktop: 'pages/settlement.html' },
            { title: '증빙내역', mobile: 'pages/receipt.html', desktop: 'pages/receipt.html' },
        ]},
        { category: '통계', items: [
            { title: '매출통계', mobile: 'pages/sales-stats.html', desktop: 'pages/sales-stats.html' },
            { title: '예약통계', mobile: 'pages/reservation-stats.html', desktop: 'pages/reservation-stats.html' },
        ]},
        { category: '설정', items: [
            { title: '고객사확인', mobile: 'pages/client.html', desktop: 'pages/client.html' },
            { title: '엑셀보관함', mobile: 'pages/excel-archive.html', desktop: 'pages/excel-archive.html' },
            { title: '직원관리', mobile: 'pages/staff.html', desktop: 'pages/staff.html' },
        ]},
    ];

    let activeItem = null;
    let openDropdown = null;

    function renderMenus() {
        const wrap = document.getElementById('gnbMenus');
        wrap.innerHTML = '';
        menu.forEach((group, gi) => {
            const div = document.createElement('div');
            div.className = 'menu-group';
            const trigger = document.createElement('button');
            trigger.className = 'menu-trigger';
            trigger.innerHTML = `${group.category} <span class="arrow">▼</span>`;
            trigger.onclick = (e) => { e.stopPropagation(); toggleDropdown(gi); };

            const dropdown = document.createElement('div');
            dropdown.className = 'menu-dropdown';
            dropdown.id = `dropdown-${gi}`;
            group.items.forEach(item => {
                const btn = document.createElement('button');
                btn.className = 'menu-item';
                btn.textContent = item.title;
                btn.dataset.path = item.path;
                btn.onclick = (e) => { e.stopPropagation(); selectPage(item, btn, trigger); };
                dropdown.appendChild(btn);
            });

            div.appendChild(trigger);
            div.appendChild(dropdown);
            wrap.appendChild(div);
        });
    }

    function toggleDropdown(idx) {
        const dd = document.getElementById(`dropdown-${idx}`);
        const isOpen = dd.classList.contains('show');
        closeAllDropdowns();
        if (!isOpen) {
            dd.classList.add('show');
            dd.closest('.menu-group').querySelector('.menu-trigger').classList.add('open');
            openDropdown = idx;
        }
    }

    function closeAllDropdowns() {
        document.querySelectorAll('.menu-dropdown').forEach(d => d.classList.remove('show'));
        document.querySelectorAll('.menu-trigger').forEach(t => t.classList.remove('open'));
        openDropdown = null;
    }

    document.addEventListener('click', closeAllDropdowns);

    function selectPage(item, btn, trigger) {
        closeAllDropdowns();
        document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
        document.querySelectorAll('.menu-trigger').forEach(t => t.classList.remove('has-active'));
        btn.classList.add('active');
        trigger.classList.add('has-active');
        activeItem = item.path;

        const content = document.getElementById('content');
        const cb = `?v=${Date.now()}`;
        content.innerHTML = `
            <div class="panel panel-mobile">
                <div class="panel-label">Mobile <span class="size">375px</span></div>
                <div class="panel-frame"><iframe src="${item.mobile}${cb}" id="mobileFrame"></iframe></div>
            </div>
            <div class="panel panel-desktop">
                <div class="panel-label">Desktop <span class="size">1920px</span></div>
                <div class="panel-frame"><iframe src="${item.desktop}${cb}" id="desktopFrame"></iframe></div>
            </div>`;
        setTimeout(adjustDesktopScale, 50);
    }

    function adjustDesktopScale() {
        const panel = document.querySelector('.panel-desktop .panel-frame');
        const iframe = document.getElementById('desktopFrame');
        if (!panel || !iframe) return;
        const scale = panel.offsetWidth / 1920;
        iframe.style.transform = `scale(${scale})`;
        iframe.style.height = (panel.offsetHeight / scale) + 'px';
    }

    window.addEventListener('resize', () => { if (activeItem) adjustDesktopScale(); });

    function saveConfig() {
        const token = document.getElementById('tokenInput').value.trim();
        const storeId = document.getElementById('storeIdInput').value.trim();
        if (token) localStorage.setItem('sv_token', token); else localStorage.removeItem('sv_token');
        if (storeId) localStorage.setItem('sv_store_id', storeId); else localStorage.removeItem('sv_store_id');
        updateStatus(!!token && !!storeId);
    }

    function updateStatus(ok) {
        const el = document.getElementById('tokenStatus');
        el.textContent = ok ? 'ON' : 'OFF';
        el.className = 'gnb-status ' + (ok ? 'on' : 'off');
    }

    (function init() {
        const token = localStorage.getItem('sv_token');
        const storeId = localStorage.getItem('sv_store_id');
        if (token) document.getElementById('tokenInput').value = token;
        if (storeId) document.getElementById('storeIdInput').value = storeId;
        updateStatus(!!token && !!storeId);
        renderMenus();
    })();
</script>
</body>
</html>
