<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>매출현황</title>
    <style>
        @font-face{font-family:'Pretendard';src:url('https://cdn.jsdelivr.net/gh/Project-Noonnu/noonfonts_2107@1.1/Pretendard-Regular.woff') format('woff');font-weight:400;}
        @font-face{font-family:'Pretendard';src:url('https://cdn.jsdelivr.net/gh/Project-Noonnu/noonfonts_2107@1.1/Pretendard-Medium.woff') format('woff');font-weight:500;}
        @font-face{font-family:'Pretendard';src:url('https://cdn.jsdelivr.net/gh/Project-Noonnu/noonfonts_2107@1.1/Pretendard-SemiBold.woff') format('woff');font-weight:600;}
        @font-face{font-family:'Pretendard';src:url('https://cdn.jsdelivr.net/gh/Project-Noonnu/noonfonts_2107@1.1/Pretendard-Bold.woff') format('woff');font-weight:700;}

        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Malgun Gothic',sans-serif;background:#f5f5f7;color:#1d1d1f;-webkit-font-smoothing:antialiased;}

        /* ── App Header ── */
        .app-header{
            position:sticky;top:0;z-index:10;
            background:#fff;
            padding:0 16px;
        }
        .header-top{
            height:44px;display:flex;align-items:center;justify-content:center;
        }
        .header-title{font-size:.95rem;font-weight:700;}

        /* ── Date Nav ── */
        .date-nav{
            display:flex;align-items:center;justify-content:center;
            gap:6px;padding:8px 0 12px;
            border-bottom:1px solid #f0f0f2;
        }
        .date-arrow{
            width:32px;height:32px;border:none;border-radius:50%;
            background:#f0f0f2;font-size:.9rem;cursor:pointer;
            display:flex;align-items:center;justify-content:center;
            transition:background .12s;color:#1d1d1f;font-family:inherit;
        }
        .date-arrow:hover{background:#e5e5e7;}
        .date-arrow:active{background:#d1d1d6;}
        .date-display{
            font-size:.88rem;font-weight:600;min-width:120px;text-align:center;
            cursor:pointer;padding:6px 12px;border-radius:8px;
            transition:background .12s;
        }
        .date-display:hover{background:#f0f0f2;}
        .date-hidden{position:absolute;opacity:0;width:0;height:0;overflow:hidden;}

        /* ── Summary ── */
        .summary{
            display:grid;grid-template-columns:1fr 1fr;gap:8px;
            padding:14px 16px;
        }
        .sum-card{
            background:#fff;border-radius:12px;padding:12px 14px;
        }
        .sum-card .label{font-size:.68rem;color:#8e8e93;font-weight:500;margin-bottom:2px;}
        .sum-card .val{font-size:1.15rem;font-weight:700;}
        .sum-card .val.c-blue{color:#0071e3;}
        .sum-card .val.c-green{color:#34c759;}
        .sum-card .val.c-red{color:#ff3b30;}
        .sum-card.wide{grid-column:span 2;display:flex;align-items:center;justify-content:space-between;}
        .sum-card.wide .val{font-size:1.25rem;}

        /* ── List ── */
        .list-section{padding:0 16px 100px;}
        .list-header{
            display:flex;align-items:center;justify-content:space-between;
            padding:10px 0 8px;
        }
        .list-count{font-size:.75rem;color:#8e8e93;font-weight:500;}
        .list-page-info{font-size:.7rem;color:#aeaeb2;}

        .sale-card{
            background:#fff;border-radius:12px;padding:14px 16px;
            margin-bottom:8px;
            transition:transform .1s;
        }
        .sale-card:active{transform:scale(.98);}
        .sale-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px;}
        .sale-leader{font-size:.88rem;font-weight:600;}
        .sale-company{font-size:.72rem;color:#8e8e93;margin-top:1px;}
        .sale-price{font-size:.95rem;font-weight:700;text-align:right;}
        .sale-price-label{font-size:.65rem;color:#8e8e93;text-align:right;}
        .sale-menu{
            font-size:.78rem;color:#3a3a3c;
            margin-bottom:8px;
            overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
        }
        .sale-bottom{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
        .sale-tag{
            font-size:.65rem;font-weight:600;padding:2px 8px;border-radius:10px;
        }
        .t-done{background:#e8f5e9;color:#2e7d32;}
        .t-cancel{background:#fce4ec;color:#c62828;}
        .t-single{background:#e3f2fd;color:#1565c0;}
        .t-group{background:#f3e5f5;color:#7b1fa2;}
        .sale-meta{font-size:.68rem;color:#aeaeb2;}
        .sale-store{font-size:.68rem;color:#aeaeb2;margin-left:auto;}

        /* ── Load More ── */
        .load-more{
            display:block;width:100%;padding:14px;margin:8px 0;
            border:none;border-radius:12px;background:#fff;
            font-size:.82rem;font-weight:600;color:#0071e3;
            font-family:inherit;cursor:pointer;transition:background .12s;
        }
        .load-more:hover{background:#f0f0f2;}

        /* ── States ── */
        .state-msg{
            text-align:center;padding:60px 20px;color:#8e8e93;font-size:.85rem;
        }
        .state-msg.error{color:#ff3b30;}
        .spinner{
            width:28px;height:28px;border:3px solid #e5e5e7;border-top-color:#0071e3;
            border-radius:50%;animation:spin .6s linear infinite;margin:0 auto 10px;
        }
        @keyframes spin{to{transform:rotate(360deg)}}

        /* ── Desktop (>600px) ── */
        @media(min-width:600px){
            .summary{grid-template-columns:repeat(4,1fr);}
            .sum-card.wide{grid-column:span 1;}
            .list-section{max-width:800px;margin:0 auto;}
            .sale-card{padding:16px 20px;}
        }
    </style>
</head>
<body>

<!-- ── Header ── -->
<div class="app-header">
    <div class="header-top">
        <div class="header-title">매출현황</div>
    </div>
    <div class="date-nav">
        <button class="date-arrow" onclick="shiftDate(-1)">&larr;</button>
        <div class="date-display" id="dateDisplay" onclick="openDatePicker()"></div>
        <button class="date-arrow" onclick="shiftDate(1)">&rarr;</button>
        <input type="date" class="date-hidden" id="dateInput" onchange="onDateChange()">
    </div>
</div>

<!-- ── Summary ── -->
<div class="summary" id="summaryArea" style="display:none;">
    <div class="sum-card wide">
        <div><div class="label">총 공급가</div><div class="val" id="sumSupply">0</div></div>
        <div><div class="label">건수</div><div class="val c-blue" id="sumTotal">0</div></div>
    </div>
    <div class="sum-card">
        <div class="label">사용완료</div>
        <div class="val c-green" id="sumUsed">0</div>
    </div>
    <div class="sum-card">
        <div class="label">취소</div>
        <div class="val c-red" id="sumCancel">0</div>
    </div>
</div>

<!-- ── List ── -->
<div class="list-section">
    <div id="statusArea">
        <div class="state-msg">날짜를 선택하면 자동 조회됩니다.</div>
    </div>
    <div id="listArea" style="display:none;">
        <div class="list-header">
            <span class="list-count" id="listCount"></span>
            <span class="list-page-info" id="listPageInfo"></span>
        </div>
        <div id="listContainer"></div>
        <button class="load-more" id="loadMoreBtn" onclick="loadMore()" style="display:none;">더보기</button>
    </div>
</div>

<script>
    const API_BASE = 'https://store-api.sikdae.com/v1/store/coupon/group';
    const PAGE_ROW = 100;
    let currentPage = 1;
    let totalCount = 0;
    let currentDate = '';

    function getConfig() {
        return {
            token: localStorage.getItem('sv_token') || '',
            storeId: localStorage.getItem('sv_store_id') || ''
        };
    }

    // ── Date Helpers ──
    function toDateStr(d) {
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    function formatDisplay(dateStr) {
        const [y, m, d] = dateStr.split('-');
        const days = ['일','월','화','수','목','금','토'];
        const dt = new Date(+y, +m-1, +d);
        return `${+m}월 ${+d}일 (${days[dt.getDay()]})`;
    }

    function shiftDate(offset) {
        const [y, m, d] = currentDate.split('-').map(Number);
        const dt = new Date(y, m-1, d + offset);
        currentDate = toDateStr(dt);
        updateDateUI();
        fetchData(1);
    }

    function openDatePicker() {
        const input = document.getElementById('dateInput');
        input.value = currentDate;
        input.showPicker();
    }

    function onDateChange() {
        currentDate = document.getElementById('dateInput').value;
        updateDateUI();
        fetchData(1);
    }

    function updateDateUI() {
        document.getElementById('dateDisplay').textContent = formatDisplay(currentDate);
    }

    // ── Format ──
    function formatTime(ts) {
        if (!ts) return '';
        const d = new Date(ts * 1000);
        return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }

    function formatNum(n) {
        return (n || 0).toLocaleString('ko-KR');
    }

    // ── Fetch ──
    async function fetchData(page) {
        const { token, storeId } = getConfig();
        if (!token || !storeId) {
            showMsg('Token 또는 Store ID를 설정해주세요.', true);
            return;
        }

        currentPage = page || 1;
        if (currentPage === 1) {
            document.getElementById('listContainer').innerHTML = '';
        }

        showMsg('<div class="spinner"></div>불러오는 중...', false);

        try {
            const url = `${API_BASE}?sid=${storeId}&date=${currentDate}&page=${currentPage}&pageRow=${PAGE_ROW}`;
            const res = await fetch(url, {
                headers: {
                    'Authorization': token.startsWith('Bearer ') ? token : `Bearer ${token}`,
                    'x-store-gsid': storeId,
                    'x-user-agent': 'Vendys/1.0 {"client": "SikdaeUser", "os": "web", "JsVersion": "2.63.0"}',
                    'Accept': 'application/json'
                }
            });

            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();

            if (data.status && data.status < 0) throw new Error(data.message || 'API Error');

            totalCount = data.totalCount || 0;
            const sales = data.sales || [];

            if (currentPage === 1) renderSummary(sales);
            renderList(sales);

            document.getElementById('summaryArea').style.display = 'grid';
            document.getElementById('statusArea').style.display = 'none';
            document.getElementById('listArea').style.display = 'block';

            const totalPages = Math.ceil(totalCount / PAGE_ROW);
            document.getElementById('loadMoreBtn').style.display = currentPage < totalPages ? 'block' : 'none';
        } catch (e) {
            showMsg(`조회 실패: ${e.message}`, true);
        }
    }

    function loadMore() {
        fetchData(currentPage + 1);
    }

    // ── Summary ──
    function renderSummary(sales) {
        const used = sales.filter(s => !s.isCanceled).length;
        const canceled = sales.filter(s => s.isCanceled).length;
        const totalSupply = sales.reduce((sum, s) => sum + (s.supplyPrice || 0), 0);

        document.getElementById('sumTotal').textContent = formatNum(totalCount) + '건';
        document.getElementById('sumSupply').textContent = formatNum(totalSupply) + '원';
        document.getElementById('sumUsed').textContent = formatNum(used) + '건';
        document.getElementById('sumCancel').textContent = formatNum(canceled) + '건';
    }

    // ── List ──
    function renderList(sales) {
        const container = document.getElementById('listContainer');

        sales.forEach((s, idx) => {
            const seq = (currentPage - 1) * PAGE_ROW + idx + 1;
            const statusTag = s.isCanceled
                ? '<span class="sale-tag t-cancel">취소</span>'
                : '<span class="sale-tag t-done">완료</span>';
            const typeTag = s.couponType === 'SINGLE'
                ? '<span class="sale-tag t-single">단체</span>'
                : '<span class="sale-tag t-group">그룹</span>';

            const card = document.createElement('div');
            card.className = 'sale-card';
            card.innerHTML = `
                <div class="sale-top">
                    <div>
                        <div class="sale-leader">${s.leaderName || '-'}</div>
                        <div class="sale-company">${s.comName || ''}</div>
                    </div>
                    <div>
                        <div class="sale-price">${formatNum(s.supplyPrice)}원</div>
                        <div class="sale-price-label">${s.member || 1}명</div>
                    </div>
                </div>
                <div class="sale-menu">${s.menuName || '-'}</div>
                <div class="sale-bottom">
                    ${statusTag}${typeTag}
                    <span class="sale-meta">${formatTime(s.useDate)}</span>
                    <span class="sale-store">${s.storeName || ''}</span>
                </div>
            `;
            container.appendChild(card);
        });

        document.getElementById('listCount').textContent = `총 ${formatNum(totalCount)}건`;
        const totalPages = Math.ceil(totalCount / PAGE_ROW) || 1;
        document.getElementById('listPageInfo').textContent = `${currentPage} / ${totalPages}`;
    }

    // ── State ──
    function showMsg(html, isError) {
        const area = document.getElementById('statusArea');
        area.style.display = 'block';
        area.innerHTML = `<div class="state-msg ${isError ? 'error' : ''}">${html}</div>`;
        document.getElementById('listArea').style.display = 'none';
        if (isError) document.getElementById('summaryArea').style.display = 'none';
    }

    // ── Init ──
    currentDate = toDateStr(new Date());
    updateDateUI();
    fetchData(1);
</script>
</body>
</html>
