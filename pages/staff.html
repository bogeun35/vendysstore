<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>직원관리</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Malgun Gothic',sans-serif;background:#f5f5f7;color:#1d1d1f;-webkit-font-smoothing:antialiased;}
        .app-header{position:sticky;top:0;z-index:10;background:#fff;padding:0 16px;border-bottom:1px solid #f0f0f2;}
        .header-top{height:44px;display:flex;align-items:center;justify-content:center;}
        .header-title{font-size:.95rem;font-weight:700;}
        .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:calc(100vh - 44px);color:#aeaeb2;gap:8px;}
        .empty-icon{font-size:2rem;opacity:.4;}
        .empty-text{font-size:.85rem;}
    </style>
</head>
<body>
    <div class="app-header"><div class="header-top"><div class="header-title">직원관리</div></div></div>
    <div class="empty">
        <div class="empty-icon">&#128679;</div>
        <div class="empty-text">준비 중입니다</div>
    </div>
</body>
</html>
