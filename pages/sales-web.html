<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>매출현황</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @font-face{font-family:'Pretendard';src:url('https://cdn.jsdelivr.net/gh/Project-Noonnu/noonfonts_2107@1.1/Pretendard-Regular.woff') format('woff');font-weight:400;}
        @font-face{font-family:'Pretendard';src:url('https://cdn.jsdelivr.net/gh/Project-Noonnu/noonfonts_2107@1.1/Pretendard-Medium.woff') format('woff');font-weight:500;}
        @font-face{font-family:'Pretendard';src:url('https://cdn.jsdelivr.net/gh/Project-Noonnu/noonfonts_2107@1.1/Pretendard-SemiBold.woff') format('woff');font-weight:600;}
        @font-face{font-family:'Pretendard';src:url('https://cdn.jsdelivr.net/gh/Project-Noonnu/noonfonts_2107@1.1/Pretendard-Bold.woff') format('woff');font-weight:700;}

        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Malgun Gothic',sans-serif;background:#f5f5f7;min-height:100vh;color:#1d1d1f;}

        /* ── Header ── */
        .page-header{background:#fff;border-bottom:1px solid #e5e5e7;padding:12px 32px;display:flex;align-items:center;justify-content:space-between;}
        .page-title{font-size:1.05rem;font-weight:700;}
        .header-right{display:flex;align-items:center;gap:10px;}
        .date-nav{display:flex;align-items:center;gap:4px;}
        .date-arrow{width:30px;height:30px;border:1px solid #e5e5e7;border-radius:6px;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.8rem;transition:background .12s;}
        .date-arrow:hover{background:#f5f5f7;}
        .date-input{padding:6px 12px;border:1.5px solid #e5e5e7;border-radius:6px;font-size:.85rem;font-family:inherit;background:#fff;}
        .date-input:focus{outline:none;border-color:#0071e3;}
        .search-input-web{padding:6px 12px;border:1.5px solid #e5e5e7;border-radius:6px;font-size:.82rem;font-family:inherit;background:#fff;width:200px;}
        .search-input-web:focus{outline:none;border-color:#0071e3;}
        .search-input-web::placeholder{color:#c7c7cc;}
        .search-btn{padding:6px 18px;border:none;border-radius:6px;background:#0071e3;color:#fff;font-size:.82rem;font-weight:600;font-family:inherit;cursor:pointer;}
        .search-btn:hover{background:#0077ed;}
        .excel-btn{padding:6px 14px;border:1px solid #2e7d32;border-radius:6px;background:#fff;color:#2e7d32;font-size:.82rem;font-weight:600;font-family:inherit;cursor:pointer;display:flex;align-items:center;gap:4px;}
        .excel-btn:hover{background:#e8f5e9;}
        .excel-btn:disabled{opacity:.5;cursor:default;}

        /* ── Summary + Chart Row ── */
        .stats-row{display:flex;gap:12px;padding:16px 32px;}
        .summary-cards{display:flex;gap:10px;flex:1;}
        .summary-card{background:#fff;border-radius:8px;padding:12px 18px;border:1px solid #e5e5e7;flex:1;}
        .summary-card .label{font-size:.72rem;font-weight:500;color:#8e8e93;margin-bottom:2px;}
        .summary-card .value{font-size:1.15rem;font-weight:700;}
        .summary-card .value.blue{color:#0071e3;}.summary-card .value.green{color:#2e7d32;}.summary-card .value.red{color:#c62828;}

        /* ── Hour Buttons (web) ── */
        .hour-card{background:#fff;border-radius:8px;padding:10px 14px;border:1px solid #e5e5e7;flex:2;display:flex;flex-direction:column;}
        .hour-card-title{font-size:.72rem;font-weight:600;color:#8e8e93;margin-bottom:6px;}
        .hour-grid-web{display:flex;flex-wrap:wrap;gap:3px;flex:1;align-content:flex-start;}
        .hour-btn-web{
            padding:4px 0;border:1px solid #e5e5e7;border-radius:5px;
            background:#fff;font-size:.7rem;font-weight:500;color:#3a3a3c;
            font-family:inherit;cursor:pointer;transition:all .12s;text-align:center;
            width:calc((100% - 21px) / 8);
        }
        .hour-btn-web:hover{background:#f5f5f7;}
        .hour-btn-web .h-cnt{font-size:.6rem;color:#aeaeb2;}
        .hour-btn-web.has-data{color:#1d1d1f;border-color:#d1d1d6;}
        .hour-btn-web.has-data .h-cnt{color:#0071e3;}
        .hour-btn-web.no-data{opacity:.35;}
        .hour-btn-web.active{background:#0071e3;color:#fff;border-color:#0071e3;}
        .hour-btn-web.active .h-cnt{color:rgba(255,255,255,.7);}
        .hour-all-web{
            width:100%;padding:3px 0;border:1px solid #e5e5e7;border-radius:5px;
            background:#f9fafb;font-size:.68rem;font-weight:600;color:#8e8e93;
            font-family:inherit;cursor:pointer;margin-bottom:4px;
        }
        .hour-all-web.active{background:#1d1d1f;color:#fff;border-color:#1d1d1f;}

        /* ── Table ── */
        .table-wrap{padding:0 32px 40px;}
        .table-info{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
        .table-count{font-size:.78rem;color:#8e8e93;font-weight:500;}
        .table-page{display:flex;align-items:center;gap:3px;}
        .page-btn{min-width:28px;height:28px;border:1px solid #e5e5e7;border-radius:5px;background:#fff;font-size:.75rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;color:#6e6e73;padding:0 6px;}
        .page-btn:hover{background:#f5f5f7;}
        .page-btn.active{background:#1d1d1f;color:#fff;border-color:#1d1d1f;}
        .page-btn:disabled{opacity:.3;cursor:default;}

        table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;border:1px solid #e5e5e7;}
        thead{background:#f9fafb;}
        th{padding:9px 12px;text-align:left;font-size:.72rem;font-weight:600;color:#8e8e93;border-bottom:1px solid #e5e5e7;white-space:nowrap;}
        td{padding:8px 12px;font-size:.8rem;border-bottom:1px solid #f0f1f3;}
        tbody tr{cursor:pointer;transition:background .1s;}
        tbody tr:hover{background:#f0f4ff;}
        .text-right{text-align:right;}.text-center{text-align:center;}
        .tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:.68rem;font-weight:600;}
        .tag-single{background:#e3f2fd;color:#1565c0;}.tag-group{background:#f3e5f5;color:#7b1fa2;}
        .tag-cancel{background:#fce4ec;color:#c62828;}.tag-done{background:#e8f5e9;color:#2e7d32;}
        .leader-name{font-weight:600;}
        .sub-text{font-size:.72rem;color:#8e8e93;}
        .menu-name{max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
        .payroom-link{color:#0071e3;font-weight:600;font-size:.78rem;}

        /* ── Detail Modal ── */
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:none;align-items:center;justify-content:center;}
        .modal-overlay.show{display:flex;}
        .modal{background:#fff;border-radius:12px;width:520px;max-height:80vh;overflow-y:auto;padding:28px 32px;box-shadow:0 20px 60px rgba(0,0,0,.2);}
        .modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
        .modal-title{font-size:1.1rem;font-weight:700;}
        .modal-close{width:32px;height:32px;border-radius:50%;border:1px solid #e5e5e7;background:#fff;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;}
        .modal-close:hover{background:#f5f5f7;}
        .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;}
        .detail-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f0f2;grid-column:span 2;}
        .detail-row.half{grid-column:span 1;padding:10px 8px 10px 0;}
        .detail-label{font-size:.8rem;color:#8e8e93;}
        .detail-val{font-size:.8rem;font-weight:600;text-align:right;max-width:65%;word-break:break-all;}
        .detail-section{font-size:.78rem;font-weight:600;color:#0071e3;padding:14px 0 6px;border-top:1px solid #e5e5e7;grid-column:span 2;}
        .menu-row{padding:8px 0;border-bottom:1px solid #f5f5f7;grid-column:span 2;}
        .menu-row-name{font-size:.85rem;font-weight:500;margin-bottom:2px;}
        .menu-row-price{font-size:.78rem;color:#8e8e93;}

        .state-msg{text-align:center;padding:60px 20px;color:#8e8e93;font-size:.88rem;}
        .state-msg.error{color:#c62828;}
        .spinner{width:28px;height:28px;border:3px solid #e5e5e7;border-top-color:#0071e3;border-radius:50%;animation:spin .6s linear infinite;margin:0 auto 10px;}
        @keyframes spin{to{transform:rotate(360deg)}}
    </style>
</head>
<body>

<div class="page-header">
    <div class="page-title">매출현황</div>
    <div class="header-right">
        <input type="text" class="search-input-web" id="searchInput" placeholder="결제번호 / 이름 검색..." oninput="applyFilters()">
        <div class="date-nav">
            <button class="date-arrow" onclick="shiftDate(-1)">&larr;</button>
            <input type="date" class="date-input" id="dateInput" onchange="onDateChange()">
            <button class="date-arrow" onclick="shiftDate(1)">&rarr;</button>
        </div>
        <button class="search-btn" onclick="fetchData(1)">조회</button>
        <button class="excel-btn" id="excelBtn" onclick="downloadExcel()" disabled>Excel</button>
    </div>
</div>

<div class="stats-row" id="statsRow" style="display:none;">
    <div class="summary-cards">
        <div class="summary-card"><div class="label">총 건수</div><div class="value blue" id="sumTotal">0</div></div>
        <div class="summary-card"><div class="label">총 결제금액</div><div class="value" id="sumSupply">0</div></div>
        <div class="summary-card"><div class="label">사용완료</div><div class="value green" id="sumUsed">0</div></div>
        <div class="summary-card"><div class="label">취소</div><div class="value red" id="sumCancel">0</div></div>
    </div>
    <div class="hour-card">
        <div class="hour-card-title">시간대 필터 [<span id="chartCount">0</span>건]</div>
        <button class="hour-all-web active" id="hourAllBtn" onclick="clearHourFilter()">전체</button>
        <div class="hour-grid-web" id="hourGrid"></div>
    </div>
</div>

<div class="table-wrap">
    <div id="statusArea"><div class="state-msg">날짜를 선택하고 조회하세요.</div></div>
    <div id="tableArea" style="display:none;">
        <div class="table-info">
            <span class="table-count" id="tableCount"></span>
            <div class="table-page" id="pagination"></div>
        </div>
        <table>
            <thead><tr>
                <th class="text-center" style="width:40px">#</th>
                <th>결제번호</th>
                <th>주문자</th>
                <th>메뉴</th>
                <th class="text-center">인원</th>
                <th class="text-right">결제금액</th>
                <th class="text-center">유형</th>
                <th class="text-center">상태</th>
                <th>시간</th>
            </tr></thead>
            <tbody id="tbody"></tbody>
        </table>
        <div class="table-info" style="margin-top:8px;">
            <span></span>
            <div class="table-page" id="paginationBottom"></div>
        </div>
    </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-header">
            <div class="modal-title" id="modalTitle">결제 상세</div>
            <button class="modal-close" onclick="closeModal()">&times;</button>
        </div>
        <div id="modalContent"><div class="state-msg"><div class="spinner"></div></div></div>
    </div>
</div>

<script>
const API_BASE = 'https://store-api.sikdae.com/v1/store/coupon';
const PAGE_ROW = 100;
let currentPage=1, totalCount=0, allSales=[], selectedHour=-1;

function getConfig(){ return {token:localStorage.getItem('sv_token')||'',storeId:localStorage.getItem('sv_store_id')||''}; }
function today(){ const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function shiftDate(o){ const i=document.getElementById('dateInput'); const [y,m,d]=i.value.split('-').map(Number); const dt=new Date(y,m-1,d+o); i.value=`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`; clearHourFilter(); fetchData(1); }
function onDateChange(){ clearHourFilter(); fetchData(1); }
function formatTime(ts){ if(!ts)return'-'; const d=new Date(ts*1000); return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`; }
function formatNum(n){ return (n||0).toLocaleString('ko-KR'); }
function getAuthHeader(){ const {token,storeId}=getConfig(); return {'Authorization':token.startsWith('Bearer ')?token:`Bearer ${token}`,'x-store-gsid':storeId,'x-user-agent':'Vendys/1.0 {"client":"SikdaeUser","os":"web","JsVersion":"2.63.0"}','Accept':'application/json'}; }

async function fetchData(page) {
    const {token,storeId}=getConfig();
    if(!token||!storeId){showMsg('Token / Store ID를 설정해주세요.',true);return;}
    currentPage=page||1;
    const date=document.getElementById('dateInput').value;
    if(!date){showMsg('날짜를 선택해주세요.',true);return;}
    showMsg('<div class="spinner"></div>불러오는 중...');
    try {
        const url=`${API_BASE}/group?sid=${storeId}&date=${date}&page=${currentPage}&pageRow=${PAGE_ROW}`;
        const res=await fetch(url,{headers:getAuthHeader()});
        if(!res.ok)throw new Error(`HTTP ${res.status}`);
        const data=await res.json();
        if(data.status&&data.status<0)throw new Error(data.message||'API Error');
        totalCount=data.totalCount||0;
        allSales=data.sales||[];
        renderSummary(); renderHourButtons(); renderTable(); renderPagination();
        document.getElementById('statsRow').style.display='flex';
        document.getElementById('statusArea').style.display='none';
        document.getElementById('tableArea').style.display='block';
        document.getElementById('excelBtn').disabled=false;
    } catch(e){showMsg(`조회 실패: ${e.message}`,true);}
}

function renderSummary() {
    const used=allSales.filter(s=>!s.isCanceled).length, canceled=allSales.filter(s=>s.isCanceled).length;
    const supply=allSales.reduce((sum,s)=>sum+(s.supplyPrice||0),0);
    document.getElementById('sumTotal').textContent=formatNum(totalCount)+'건';
    document.getElementById('sumSupply').textContent=formatNum(supply)+'원';
    document.getElementById('sumUsed').textContent=formatNum(used)+'건';
    document.getElementById('sumCancel').textContent=formatNum(canceled)+'건';
}

function renderHourButtons() {
    const hours=Array(24).fill(0);
    allSales.forEach(s=>{if(s.useDate){hours[new Date(s.useDate*1000).getHours()]++;}});
    document.getElementById('chartCount').textContent=allSales.length;
    const grid=document.getElementById('hourGrid'); grid.innerHTML='';
    hours.forEach((cnt,h)=>{
        const cls=selectedHour===h?'active':cnt>0?'has-data':'no-data';
        grid.innerHTML+=`<button class="hour-btn-web ${cls}" onclick="toggleHourFilter(${h})">${h}시 <span class="h-cnt">${cnt}</span></button>`;
    });
    document.getElementById('hourAllBtn').className='hour-all-web'+(selectedHour<0?' active':'');
}

function toggleHourFilter(h) {
    selectedHour=selectedHour===h?-1:h; renderHourButtons(); applyFilters();
}
function clearHourFilter(){ selectedHour=-1; renderHourButtons(); applyFilters(); }

function renderTable() {
    const tbody=document.getElementById('tbody'); tbody.innerHTML='';
    allSales.forEach((s,idx)=>{
        const seq=(currentPage-1)*PAGE_ROW+idx+1;
        const typeTag=s.couponType==='SINGLE'?'<span class="tag tag-single">단체</span>':'<span class="tag tag-group">그룹</span>';
        const statusTag=s.isCanceled?'<span class="tag tag-cancel">취소</span>':'<span class="tag tag-done">완료</span>';
        const hour=s.useDate?new Date(s.useDate*1000).getHours():'';
        const tr=document.createElement('tr');
        tr.dataset.payRoom=s.payRoomIdx||'';
        tr.dataset.leader=(s.leaderName||'').replace(/\*/g,'');
        tr.dataset.hour=hour;
        tr.onclick=()=>openDetail(s.couponId);
        tr.innerHTML=`
            <td class="text-center sub-text">${seq}</td>
            <td><span class="payroom-link">#${s.payRoomIdx||'-'}</span></td>
            <td><div class="leader-name">${s.leaderName||'-'}</div><div class="sub-text">${s.comName||''}</div></td>
            <td><div class="menu-name" title="${s.menuName||''}">${s.menuName||'-'}</div></td>
            <td class="text-center">${s.member||1}</td>
            <td class="text-right" style="font-weight:600;">${formatNum(s.supplyPrice)}원</td>
            <td class="text-center">${typeTag}</td>
            <td class="text-center">${statusTag}</td>
            <td class="sub-text">${formatTime(s.useDate)}</td>`;
        tbody.appendChild(tr);
    });
    document.getElementById('tableCount').textContent=`총 ${formatNum(totalCount)}건 (${currentPage}/${Math.ceil(totalCount/PAGE_ROW)||1} 페이지)`;
}

function applyFilters() {
    const q=(document.getElementById('searchInput').value||'').trim().toLowerCase();
    document.querySelectorAll('#tbody tr').forEach(tr=>{
        const payRoom=(tr.dataset.payRoom||'').toLowerCase();
        const leader=(tr.dataset.leader||'').toLowerCase();
        const text=tr.textContent.toLowerCase();
        const hour=parseInt(tr.dataset.hour,10);
        const matchSearch=!q||payRoom.includes(q)||leader.includes(q)||text.includes(q);
        const matchHour=selectedHour<0||hour===selectedHour;
        tr.style.display=(matchSearch&&matchHour)?'':'none';
    });
}

function renderPagination() {
    const tp=Math.ceil(totalCount/PAGE_ROW)||1;
    let h=`<button class="page-btn" onclick="fetchData(${currentPage-1})" ${currentPage<=1?'disabled':''}>&lt;</button>`;
    let s=Math.max(1,currentPage-2),e=Math.min(tp,s+4);if(e-s<4)s=Math.max(1,e-4);
    for(let i=s;i<=e;i++) h+=`<button class="page-btn ${i===currentPage?'active':''}" onclick="fetchData(${i})">${i}</button>`;
    h+=`<button class="page-btn" onclick="fetchData(${currentPage+1})" ${currentPage>=tp?'disabled':''}>&gt;</button>`;
    document.getElementById('pagination').innerHTML=h;
    document.getElementById('paginationBottom').innerHTML=h;
}

// ── Detail Modal ──
async function openDetail(couponId) {
    document.getElementById('modalOverlay').classList.add('show');
    document.getElementById('modalContent').innerHTML='<div class="state-msg"><div class="spinner"></div></div>';
    try {
        const {storeId}=getConfig();
        const res=await fetch(`${API_BASE}/${couponId}?sid=${storeId}`,{headers:getAuthHeader()});
        if(!res.ok)throw new Error(`HTTP ${res.status}`);
        const data=await res.json();
        if(data.status&&data.status<0)throw new Error(data.message);
        const c=data.coupon, menus=data.menus||[];
        const statusText=c.paymentStatus==='USED'?'사용완료':c.paymentStatus==='CANCELED'?'취소':c.paymentStatus;
        document.getElementById('modalTitle').textContent=`${c.leaderName||'-'} · #${c.payRoomIdx||'-'}`;
        let html=`<div class="detail-grid">
            <div class="detail-row"><span class="detail-label">결제번호</span><span class="detail-val">${c.payRoomIdx||'-'}</span></div>
            <div class="detail-row"><span class="detail-label">쿠폰 ID</span><span class="detail-val" style="font-size:.75rem;">${c.couponId}</span></div>
            <div class="detail-row half"><span class="detail-label">상태</span><span class="detail-val">${statusText}</span></div>
            <div class="detail-row half"><span class="detail-label">결제유형</span><span class="detail-val">${c.couponType==='SINGLE'?'단체':'그룹'}</span></div>
            <div class="detail-row half"><span class="detail-label">결제금액</span><span class="detail-val" style="font-weight:700;font-size:.95rem;">${formatNum(c.totalSupplyPrice)}원</span></div>
            <div class="detail-row half"><span class="detail-label">결제방식</span><span class="detail-val">${c.paymentType||'-'}</span></div>
            <div class="detail-row half"><span class="detail-label">사용일시</span><span class="detail-val">${formatTime(c.useDate)}</span></div>
            <div class="detail-row half"><span class="detail-label">등록일시</span><span class="detail-val">${formatTime(c.regDate)}</span></div>
            <div class="detail-row half"><span class="detail-label">주문자</span><span class="detail-val">${c.leaderName||'-'}</span></div>
            <div class="detail-row half"><span class="detail-label">취소가능</span><span class="detail-val">${c.isCancelable?'가능':'불가'}</span></div>
            <div class="detail-section">주문 메뉴 (${menus.length})</div>`;
        menus.forEach(m=>{
            html+=`<div class="menu-row"><div class="menu-row-name">${m.menuName}</div><div class="menu-row-price">${formatNum(m.sellPrice)}원 × ${m.count}개</div></div>`;
        });
        html+=`</div>`;
        document.getElementById('modalContent').innerHTML=html;
    } catch(e) {
        document.getElementById('modalContent').innerHTML=`<div class="state-msg error">상세 조회 실패: ${e.message}</div>`;
    }
}

function closeModal(e) { if(e&&e.target!==e.currentTarget)return; document.getElementById('modalOverlay').classList.remove('show'); }
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

// ── Excel Download (all pages) ──
async function downloadExcel() {
    const {token,storeId}=getConfig();
    const date=document.getElementById('dateInput').value;
    if(!token||!storeId||!date) return;

    const btn=document.getElementById('excelBtn');
    const origText=btn.textContent;
    btn.disabled=true;

    let all=[], page=1, total=1;
    try {
        while((page-1)*PAGE_ROW < total) {
            btn.textContent=`수집중... (${all.length})`;
            const url=`${API_BASE}/group?sid=${storeId}&date=${date}&page=${page}&pageRow=${PAGE_ROW}`;
            const res=await fetch(url,{headers:getAuthHeader()});
            if(!res.ok) throw new Error(`HTTP ${res.status}`);
            const data=await res.json();
            if(data.status&&data.status<0) throw new Error(data.message);
            total=data.totalCount||0;
            all=all.concat(data.sales||[]);
            page++;
        }

        btn.textContent=`생성중... (${all.length}건)`;

        const rows=[['#','결제번호','쿠폰ID','주문자','고객사','메뉴','인원','결제금액','유형','상태','시간']];
        all.forEach((s,i)=>{
            rows.push([
                i+1,
                s.payRoomIdx||'',
                s.couponId||'',
                s.leaderName||'',
                s.comName||'',
                s.menuName||'',
                s.member||1,
                s.supplyPrice||0,
                s.couponType==='SINGLE'?'단체':'그룹',
                s.isCanceled?'취소':'완료',
                formatTime(s.useDate)
            ]);
        });

        const ws=XLSX.utils.aoa_to_sheet(rows);
        ws['!cols']=[{wch:5},{wch:12},{wch:38},{wch:8},{wch:14},{wch:40},{wch:6},{wch:10},{wch:6},{wch:6},{wch:10}];
        const wb=XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb,ws,'매출현황');
        XLSX.writeFile(wb,`매출현황_${date}_${all.length}건.xlsx`);
    } catch(e) {
        alert('엑셀 다운로드 실패: '+e.message);
    } finally {
        btn.textContent=origText;
        btn.disabled=false;
    }
}

function showMsg(html,isErr) {
    document.getElementById('statusArea').style.display='block';
    document.getElementById('statusArea').innerHTML=`<div class="state-msg ${isErr?'error':''}">${html}</div>`;
    document.getElementById('tableArea').style.display='none';
    if(isErr)document.getElementById('statsRow').style.display='none';
}

document.getElementById('dateInput').value=today();
fetchData(1);
</script>
</body>
